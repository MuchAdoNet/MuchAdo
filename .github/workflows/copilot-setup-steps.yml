name: Copilot Setup Steps

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_NOLOGO: 1
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

defaults:
  run:
    shell: pwsh

jobs:
  copilot-setup-steps:
    name: Copilot Setup Steps
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v4
    - name: Install .NET
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json
    - name: Restore
      run: .\build.ps1 restore
    - name: Start Docker
      run: |
        docker compose -f docker/docker-compose.yml up -d --build mssql mysql postgres
        docker compose -f docker/docker-compose.yml build setup
        docker compose -f docker/docker-compose.yml run --rm setup
